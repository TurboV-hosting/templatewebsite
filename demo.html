<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Complete | HostingTemplateSite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0d1117;
            --primary: #4f46e5; 
            --primary-glow: rgba(79, 70, 229, 0.3);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --accent: #818cf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .demo-container {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 600px;
            padding: 20px;
        }

        .hero-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            background: var(--primary-glow);
            filter: blur(100px);
            z-index: -1;
            border-radius: 50%;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(79, 70, 229, 0.1);
            border: 1px solid var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: var(--accent);
            font-size: 2rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 16px;
            line-height: 1.1;
        }

        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        .btn-outline {
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="hero-glow"></div>

    <div class="demo-container">
        <div class="icon-box">✓</div>
        <h1>Demo <span class="gradient-text">Completed.</span></h1>
        <p>You've reached the end of the interactive preview. Ready to deploy your high-performance node?</p>
        
        <div class="button-group">
            <a href="https://emma-novapup.github.io/HostingTemplateWebsite/#pricing" class="btn btn-primary">View Final Pricing</a>
            <a href="https://emma-novapup.github.io/HostingTemplateWebsite/" class="btn btn-outline">Back to Home</a>
        </div>
    </div>

</body>
</html>
