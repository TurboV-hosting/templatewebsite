<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Complete | HostingTemplateSite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0d1117;
            --primary: #4f46e5; 
            --primary-glow: rgba(79, 70, 229, 0.3);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --accent: #818cf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .demo-container {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 650px;
            padding: 40px;
            background: rgba(13, 17, 23, 0.4);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        .hero-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 500px;
            background: var(--primary-glow);
            filter: blur(120px);
            z-index: -1;
            border-radius: 50%;
        }

        .badge {
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            border: 1px solid rgba(79, 70, 229, 0.2);
            font-weight: 600;
            display: inline-block;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .feature-tag {
            color: var(--accent);
            font-weight: 600;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            font-size: 1rem;
            display: inline-block;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px var(--primary-glow);
            transform: translateY(-2px);
            background: #5a52ff;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="hero-glow"></div>

    <div class="demo-container">
        <span class="badge">Preview Mode Finished</span>
        <h1>This is the <span class="gradient-text">end of the demo.</span></h1>
        
        <p>
            Purchase this template to gain access to the <span class="feature-tag">full source code</span> and 
            <span class="feature-tag">HTML files of every page</span>, including the Main Site, VPS, and Dedicated sections.
        </p>
        
        <div class="button-group">
            <!-- UPDATED LINK TO TURBOV SALES TEMPLATE -->
            <a href="https://emma-novapup.github.io/TurboV/saletemplates.html" class="btn btn-primary">View Final Pricing</a>
        </div>

        <div class="footer-note">
            Includes CSS, responsive layouts, and modern glow effects.
        </div>
    </div>

</body>
</html>
